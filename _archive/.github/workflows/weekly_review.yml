name: Weekly Review

on:
  schedule:
    - cron: '0 20 * * 5'  # Friday 8 PM UTC
  workflow_dispatch:

jobs:
  generate-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - run: pip install groq

      - name: Generate Weekly Review
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python3 agents/weekly_review.py

      - name: Commit review
        run: |
          git config --global user.name 'Focus Engine'
          git config --global user.email 'focus@penjy.dev'
          git add outputs/WEEKLY_REVIEW.md
          git diff --staged --quiet || git commit -m "📊 Weekly review $(date +%Y-%m-%d)"
          git push
