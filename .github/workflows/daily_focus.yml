name: Daily Focus Engine

on:
  schedule:
    - cron: '0 7 * * *'  # 7:00 AM UTC daily
  workflow_dispatch:

jobs:
  generate-focus:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - run: pip install google-generativeai

      - name: Run Focus Engine
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python3 agents/focus_engine.py

      - name: Commit outputs
        run: |
          git config --global user.name 'Focus Engine'
          git config --global user.email 'focus@penjy.dev'
          git add outputs/TODAY.md data/focus_history.json
          git diff --staged --quiet || git commit -m "🎯 Focus for $(date +%Y-%m-%d)"
          git push
